file:
  client-path: /file
  storage-location: C:\Users\User\OneDrive\Documents\ITE-fileUpload/
  base-uri: http://localhost:${server.port}${file.client-path}
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${URL}
    username: ${USERNAME}
    password: ${PASSWORD}
  application:
    name: co.stad.project
server:
  port: 8081
